services:
  backend:
    build: ./backend
    container_name: django-backend
    expose:
      - "8000"
    volumes:
      - ./backend:/app          #монтирует всю папку backend (включая media)
      - backend_data:/app/data
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: react-frontend
    ports:
      - "80:80"
    volumes:
      - ./backend/media:/app/media   #монтируем папку media из backend
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data: